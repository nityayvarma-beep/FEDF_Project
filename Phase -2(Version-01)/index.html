<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediAssist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <h1>MediAssist</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#profile">Profile</a>
      <a href="#analysis">Analysis</a>
      <a href="#doctors">Doctors</a>
    </nav>
  </header>

  <!-- Hero Section -->
  <section id="home" class="hero">
    <h2>Smart Healthcare Analysis System</h2>
    <p>Analyze symptoms and get doctor suggestions instantly.</p>
    <button onclick="scrollToAnalysis()">Start Analysis</button>
  </section>

  <!-- Patient Profile -->
  <section id="profile" class="container">
    <h2>Patient Profile</h2>

    <div class="form-group">
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label>Age</label>
      <input type="number" id="age" placeholder="Enter your age">
    </div>

    <div class="form-group">
      <label for="gender">Gender</label>
      <select id="gender" title="Select your gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <div class="form-group">
      <label>Medical History</label>
      <textarea id="history" placeholder="Enter medical history"></textarea>
    </div>
  </section>

  <!-- Analysis Section -->
  <section id="analysis" class="container">
    <h2>Symptom & Food Analysis</h2>

    <div class="form-group">
      <label>Symptoms</label>
      <input type="text" id="symptoms" placeholder="Example: chest burning, head pain">
    </div>

    <div class="form-group">
      <label>Food Eaten</label>
      <input type="text" id="food" placeholder="Example: spicy food">
    </div>

    <button onclick="analyzeHealth()">Analyze</button>

    <div id="resultCard" class="result-card hidden">
      <h3>Analysis Result</h3>
      <p id="issue"></p>
      <p id="doctor"></p>
    </div>
  </section>

  <!-- Doctors Section -->
  <section id="doctors" class="container">
    <h2>Recommended Doctors</h2>

    <div class="doctor-grid" id="doctorGrid">
    </div>
  </section>

  <footer>
    <p>© 2026 MediAssist Healthcare System</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
